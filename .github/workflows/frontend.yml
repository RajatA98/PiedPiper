name: Frontend build + tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: quality-scorer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quality-scorer/package-lock.json

      - name: Install
        run: npm ci

      - name: Vitest
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify no Soundcheck-era leakage in bundle
        run: |
          if grep -i -q "soundcheck" dist/assets/*.js dist/assets/*.css; then
            echo "ERROR: Soundcheck string survived into the built bundle." >&2
            exit 1
          fi
          if grep -q "#090b0e\|#2ee6d6" dist/assets/*.css; then
            echo "ERROR: legacy dark-phosphor color survived into the CSS." >&2
            exit 1
          fi
          echo "Bundle is clean of legacy aesthetic strings."

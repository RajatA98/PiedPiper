name: Backend tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install backend
        run: pip install -e "backend/[runtime,ingest,dev]"

      - name: Run fast tests
        run: |
          cd backend
          pytest -q -m "not slow"
